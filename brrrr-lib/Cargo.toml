[package]
authors = ["Trent Hauck <trent@trenthauck.com>"]
edition = "2018"
name = "brrrr-lib"
version = "0.9.0"

[dependencies]
arrow = {git = "https://github.com/apache/arrow"}
bio = {git = "https://github.com/rust-bio/rust-bio"}
itertools = "0.9.0"
parquet = {git = "https://github.com/apache/arrow"}
serde = {version = "1.0", features = ["derive"]}
serde_json = "1.0"
nalgebra = "0.18"
rand = "0.8.0"
rand_distr = "0.4.0"
statrs = "0.13.0"
env_logger = "*"
log = "0.4"

[dev-dependencies]
criterion = "0.3"
ctor = "*"

[[bench]]
harness = false
name = "read_fasta"

[[example]]
name = "hello_world_parquet"
path = "examples/fa2jsonl.rs"
